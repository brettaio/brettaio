<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify form stub</title>
  </head>
  <body>
    <form
      name="project-inquiry"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="project-inquiry" />
      <input type="text" name="bot-field" />

      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="company" />
      <input type="url" name="website" />
      <input type="text" name="role" />
      <input type="text" name="business-model" />

      <input type="text" name="priority-qualified-leads" />
      <input type="text" name="priority-organic-traffic" />
      <input type="text" name="priority-paid-performance" />
      <input type="text" name="priority-digital-presence" />
      <input type="text" name="priority-conversion-quality" />
      <input type="text" name="priority-positioning" />

      <textarea name="problem"></textarea>
      <textarea name="lead-quality"></textarea>
      <textarea name="organic"></textarea>
      <textarea name="paid"></textarea>
      <textarea name="presence"></textarea>
      <textarea name="outcome"></textarea>

      <input type="text" name="timeline" />
      <input type="text" name="budget" />

      <textarea name="context"></textarea>
    </form>
  </body>
</html>
